services:
  db:
    image: postgis/postgis:16-3.4
    container_name: pawpawland-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: pawpaw
      POSTGRES_PASSWORD: pawpaw
      POSTGRES_DB: pawpawland
    volumes:
      - pawpawland_pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pawpaw -d pawpawland']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pawpawland_pgdata:
